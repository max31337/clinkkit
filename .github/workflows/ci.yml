name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        lua-version:
          - "5.1"
          - "5.4"

    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Run tests
        working-directory: tests
        run: lua run_tests.lua