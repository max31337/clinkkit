name: Continuous Integration

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest # Fixed: Changed from windows-latest to ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: MunifTanjim/luver-action@v1
        with:
          default: 5.4.7 # Optimized: Automatically sets up Lua 5.4.7

      - name: Verify Lua
        run: |
          lua -v

      - name: Run Tests
        run: |
          cd tests
          lua run_tests.lua
