name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            lua
            lua-luarocks
            mingw-w64-ucrt-x86_64-lua
            mingw-w64-ucrt-x86_64-lua-luarocks

      - name: Verify Lua
        run: |
          lua -v
          luarocks --version

      - name: Install Luacheck
        run: |
          luarocks install luacheck

      - name: Run Luacheck
        run: |
          luacheck .

      - name: Run Tests
        run: |
          cd tests
          lua run_tests.lua